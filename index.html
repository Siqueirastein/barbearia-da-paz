<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Da Paz</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  background:
  linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.92)),
  url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70") center/cover;

  color:white;

  padding:24px;
}

.container{
  max-width:460px;
  margin:auto;
}

.logo{

  width:120px;
  height:120px;

  margin:30px auto 18px;

  border-radius:50%;

  overflow:hidden;

  border:2px solid #d08a3a;

  background:#111;

  box-shadow:0 0 35px rgba(208,138,58,.35);
}

.logo img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:block;
}

h1{

  text-align:center;

  font-size:34px;

  margin-bottom:10px;
}

.subtitle{

  text-align:center;

  color:#ccc;

  margin-bottom:26px;

  line-height:1.5;
}

.card{

  background:rgba(15,15,15,.94);

  border:1px solid rgba(208,138,58,.3);

  border-radius:28px;

  padding:24px;

  box-shadow:0 20px 60px rgba(0,0,0,.55);
}

.badge{

  text-align:center;

  color:#d08a3a;

  font-size:13px;

  font-weight:bold;

  margin-bottom:18px;
}

.buttons{

  display:flex;

  flex-direction:column;

  gap:14px;
}

.btn{

  text-decoration:none;

  color:white;

  background:#1b1b1b;

  border:1px solid #2e2e2e;

  padding:16px;

  border-radius:16px;

  text-align:center;

  font-weight:bold;

  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.primary{

  background:linear-gradient(135deg,#d08a3a,#8a4f1f);

  color:#111;
}

.whatsapp{

  background:#16803a;

  border-color:#25d366;
}

.footer{

  text-align:center;

  margin-top:24px;

  color:#888;

  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="assets/logo.png" alt="Logo Barbearia Da Paz">
  </div>

  <h1>BARBEARIA DA PAZ</h1>

  <p class="subtitle">
    Barbearia premium para quem busca estilo, cuidado e uma experiência diferenciada.
  </p>

  <div class="card">

    <p class="badge">
      CORTE • BARBA • ESTILO • VIP
    </p>

    <div class="buttons">

      <a href="agendamento.html" class="btn primary">
        Agendar horário
      </a>

      <a href="servicos.html" class="btn">
        Ver serviços
      </a>

      <a href="vip.html" class="btn">
        Planos VIP
      </a>

      <a href="login.html" class="btn">
        Área do barbeiro
      </a>

      <a
        href="https://wa.me/5591982041321"
        class="btn whatsapp"
      >
        Falar no WhatsApp
      </a>

    </div>

    <p class="footer">
      Mais que um corte. Uma experiência.
    </p>

  </div>

</div>

</body>
</html>
