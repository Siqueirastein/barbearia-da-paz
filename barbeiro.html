<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel • Barbearia Da Paz</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.95)),
    url("https://images.unsplash.com/photo-1585747860715-2ba37e788b70") center/cover;
  color:white;
  padding:24px;
}

.container{
  max-width:900px;
  margin:auto;
}

.logo{
  width:120px;
  height:120px;
  margin:25px auto 18px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #d08a3a;
  background:#111;
  box-shadow:0 0 35px rgba(208,138,58,.35);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#ccc;
  margin-bottom:24px;
}

.filters{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#d08a3a;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1e1e1e;
  color:white;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:22px;
}

.card{
  background:rgba(15,15,15,.95);
  border:1px solid rgba(208,138,58,.28);
  border-radius:22px;
  padding:18px;
  text-align:center;
}

.card h2{
  color:#d08a3a;
  font-size:28px;
  margin-bottom:8px;
}

.card p{
  color:#bbb;
  font-size:14px;
}

.lista{
  background:rgba(15,15,15,.95);
  border:1px solid rgba(208,138,58,.28);
  border-radius:26px;
  padding:22px;
}

.lista h2{
  color:#d08a3a;
  text-align:center;
  margin-bottom:18px;
}

.agendamento{
  background:#1f1f1f;
  border-left:5px solid #d08a3a;
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

.agendamento p{
  color:#ddd;
  margin-bottom:7px;
}

.agendamento strong{
  color:#d08a3a;
}

.status{
  display:inline-block;
  margin-top:8px;
  padding:7px 12px;
  border-radius:999px;
  background:#4b3810;
  color:#ffd15d;
  font-size:12px;
  font-weight:bold;
}

.confirmado{
  background:#103d24;
  color:#72f59f;
}

.concluido{
  background:#123a5a;
  color:#7bc2ff;
}

.cancelado{
  background:#5a1717;
  color:#ff9494;
}

.btns{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:14px;
}

button,a.btn{
  padding:12px;
  border:none;
  border-radius:13px;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  font-size:13px;
}

.confirmar{
  background:linear-gradient(135deg,#d08a3a,#8a4f1f);
  color:#111;
}

.concluir{
  background:#123a5a;
  color:white;
}

.cancelar{
  background:#5a1717;
  color:white;
}

.whats{
  background:#16803a;
  color:white;
}

.back{
  display:block;
  text-align:center;
  margin-top:18px;
  padding:15px;
  border-radius:16px;
  background:#222;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.vazio{
  text-align:center;
  color:#aaa;
  padding:20px;
}

@media(max-width:760px){
  .dashboard,
  .filters,
  .btns{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="assets/logo.png" alt="Logo Barbearia Da Paz">
  </div>

  <h1>Painel do barbeiro</h1>

  <p class="subtitle">
    Agendamentos reais salvos no Firebase.
  </p>

  <div class="filters">

    <div class="input-group">
      <label>Filtrar por data</label>
      <input type="date" id="filtroData" onchange="carregarAgendamentos()">
    </div>

    <div class="input-group">
      <label>Filtrar por barbeiro</label>
      <select id="filtroBarbeiro" onchange="carregarAgendamentos()">
        <option value="Todos">Todos</option>
        <option value="Felipe">Felipe</option>
        <option value="Carlos">Carlos</option>
        <option value="João">João</option>
      </select>
    </div>

  </div>

  <div class="dashboard">

    <div class="card">
      <h2 id="total">0</h2>
      <p>Agendamentos</p>
    </div>

    <div class="card">
      <h2 id="pendentes">0</h2>
      <p>Pendentes</p>
    </div>

    <div class="card">
      <h2 id="concluidos">0</h2>
      <p>Concluídos</p>
    </div>

    <div class="card">
      <h2 id="ganhos">R$ 0</h2>
      <p>Ganhos</p>
    </div>

  </div>

  <div class="lista">

    <h2>Agenda</h2>

    <div id="listaAgendamentos">
      <p class="vazio">Carregando...</p>
    </div>

  </div>

  <a href="index.html" class="back">
    Voltar para o início
  </a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDoXPstgyshmkHH8J_KrYVaejd-_fAa_PI",
  authDomain: "barbearia-da-paz.firebaseapp.com",
  projectId: "barbearia-da-paz",
  storageBucket: "barbearia-da-paz.firebasestorage.app",
  messagingSenderId: "352751065325",
  appId: "1:352751065325:web:bb584e5474dccfc0d294e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split("T")[0];
document.getElementById("filtroData").value = hoje;

function statusClasse(status){
  if(status === "Confirmado") return "confirmado";
  if(status === "Concluído") return "concluido";
  if(status === "Cancelado") return "cancelado";
  return "";
}

function textoSeguro(valor){
  return valor || "Não informado";
}

function montarWhatsapp(ag){
  const mensagem =
`Olá, ${ag.nome}. Seu horário na Barbearia Da Paz está registrado.

Serviço: ${ag.servico}
Barbeiro: ${ag.barbeiro}
Data: ${ag.data}
Horário: ${ag.hora}`;

  return `https://wa.me/55${String(ag.telefone).replace(/\D/g,"")}?text=${encodeURIComponent(mensagem)}`;
}

window.carregarAgendamentos = async function(){
  const area = document.getElementById("listaAgendamentos");
  const filtroData = document.getElementById("filtroData").value;
  const filtroBarbeiro = document.getElementById("filtroBarbeiro").value;

  area.innerHTML = `<p class="vazio">Carregando...</p>`;

  const q = query(
    collection(db, "agendamentos"),
    orderBy("criadoEm", "desc")
  );

  const resultado = await getDocs(q);

  let total = 0;
  let pendentes = 0;
  let concluidos = 0;
  let ganhos = 0;

  area.innerHTML = "";

  resultado.forEach((documento) => {
    const ag = documento.data();
    const id = documento.id;

    const passaData = !filtroData || ag.data === filtroData;
    const passaBarbeiro = filtroBarbeiro === "Todos" || ag.barbeiro === filtroBarbeiro;

    if(!passaData || !passaBarbeiro){
      return;
    }

    const status = ag.status || "Pendente";

    total++;

    if(status === "Pendente"){
      pendentes++;
    }

    if(status === "Concluído"){
      concluidos++;
      ganhos += Number(ag.valor || 0);
    }

    area.innerHTML += `
      <div class="agendamento">

        <p><strong>Cliente:</strong> ${textoSeguro(ag.nome)}</p>
        <p><strong>Telefone:</strong> ${textoSeguro(ag.telefone)}</p>
        <p><strong>Serviço:</strong> ${textoSeguro(ag.servico)}</p>
        <p><strong>Barbeiro:</strong> ${textoSeguro(ag.barbeiro)}</p>
        <p><strong>Data:</strong> ${textoSeguro(ag.data)}</p>
        <p><strong>Horário:</strong> ${textoSeguro(ag.hora)}</p>
        <p><strong>Valor:</strong> R$ ${ag.valor || 0}</p>

        <span class="status ${statusClasse(status)}">
          ${status}
        </span>

        <div class="btns">

          <button class="confirmar" onclick="alterarStatus('${id}', 'Confirmado')">
            Confirmar
          </button>

          <button class="concluir" onclick="alterarStatus('${id}', 'Concluído')">
            Concluir
          </button>

          <button class="cancelar" onclick="alterarStatus('${id}', 'Cancelado')">
            Cancelar
          </button>

          <a class="btn whats" href="${montarWhatsapp(ag)}" target="_blank">
            WhatsApp
          </a>

        </div>

      </div>
    `;
  });

  if(total === 0){
    area.innerHTML = `<p class="vazio">Nenhum agendamento encontrado.</p>`;
  }

  document.getElementById("total").textContent = total;
  document.getElementById("pendentes").textContent = pendentes;
  document.getElementById("concluidos").textContent = concluidos;
  document.getElementById("ganhos").textContent = "R$ " + ganhos;
}

window.alterarStatus = async function(id, status){
  await updateDoc(doc(db, "agendamentos", id), {
    status: status
  });

  carregarAgendamentos();
}

carregarAgendamentos();
</script>

</body>
</html>
